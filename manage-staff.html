<!DOCTYPE html>
<html>
<head>
  <title>Manage Staff</title>
  <link rel="stylesheet" href="style.css">
</head>

<body
onload="
checkPermission('manager');
showStaffAccounts()
">

<div class="box">

  <h1>Manage Staff Account</h1>

  <input
    type="text"
    id="staffName"
    placeholder="Staff Username"
  >

  <input
    type="password"
    id="staffPass"
    placeholder="Password"
  >

  <button onclick="createStaff()">
    Create Staff
  </button>

  <h3>Staff List</h3>

  <p id="staffList"></p>

  <a href="manager-dashboard.html">
    <button class="logout">Back</button>
  </a>

</div>

<script src="script.js"></script>
</body>
</html>
