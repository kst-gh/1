<!DOCTYPE html>
<html>
<head>
  <title>Manager Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="box">

  <h1>Manager Login</h1>

  <input
    type="text"
    id="managerUsername"
    placeholder="Username"
  >

  <input
    type="password"
    id="managerPassword"
    placeholder="Password"
  >

  <button onclick="managerLogin()">
    Login
  </button>

  <a href="index.html">
    <button class="logout">Back</button>
  </a>

</div>

<script src="script.js"></script>
</body>
</html>
